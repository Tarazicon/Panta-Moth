- type: trait
  id: LeftBionicPryArm
  name: trait-name-LeftBionicPryArm
  description: trait-description-BionicPryArm
  category: Disabilities
  cost: 2
  conflicts:
  - ArmAmputeeRight
  - ArmAmputeeLeft
  - RightBionicPryArm
  effects:
  - !type:AddCompsEffect
    components:
    - type: Amputee
      removeBodyPart: Arm
      partSymmetry: Left
      protoId: JawsOfLifeLeftArm
      slotId: "left arm"

- type: trait
  id: RightBionicPryArm
  name: trait-name-RightBionicPryArm
  description: trait-description-BionicPryArm
  category: Disabilities
  cost: 2
  conflicts:
  - ArmAmputeeRight
  - ArmAmputeeLeft
  - LeftBionicPryArm
  effects:
  - !type:AddCompsEffect
    components:
    - type: Amputee
      removeBodyPart: Arm
      partSymmetry: Right
      protoId: JawsOfLifeRightArm
      slotId: "right arm"

- type: trait
  id: CyberEyesFlare
  name: trait-name-CyberEyesFlare
  description: trait-description-CyberEyesFlare
  category: Medical
  cost: 8
  conflicts:
  - Blindness
  - PoorVision
  effects:
  - !type:AddCompsEffect
    components:
    - type: FlashImmunity
      showInExamine: false
    - type: EyeProtection

- type: trait
  id: CyberEyesNightVision
  category: Medical
  name: trait-name-CyberEyesNightVision
  description: trait-description-CyberEyesNightVision
  cost: 8
  conflicts:
  - Blindness
  - PoorVision
  conditions:
  - !type:HasJobCondition
    invert: true
    job: Prisoner
  - !type:OneOfSpeciesCondition
    invert: true
    species:
    - Felinid
    - Shadowkin
    - Rodentia
    - Tajaran
  effects:
  - !type:AddCompsEffect
    components:
    - type: NightVision

