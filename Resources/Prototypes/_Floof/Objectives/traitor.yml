- type: entity
  parent: [BaseTraitorObjective, BaseTeachLessonObjective]
  id: TeachRandomTraitorObjective
  description: We have reason to believe that they are becoming a liability teach them a lesson before they do.
  components:
  - type: Objective
    difficulty: 2 # They can easily buy weapons to defend themselves if they think something is up.
  - type: TargetObjective
    title: objective-condition-traitor-teach-title
  - type: PickRandomTraitor
    targetType: Teach

- type: entity
  parent: [BaseTraitorObjective, BaseTeachLessonObjective]
  id: TeachRandomHeadObjective
  description: We need this head taught a lesson and you probably know why. Good luck, agent.
  components:
  - type: Objective
    difficulty: 3.0
    # killing 1 head is enough
    unique: true
  - type: TargetObjective
    title: objective-condition-teach-head-title
  - type: PickRandomPerson
    filters:
    - !type:BodyMindFilter
      whitelist:
        components:
        - CommandStaff
    # Can't have multiple objectives to kill the same person.
    - !type:TargetObjectiveMindFilter
      blacklist:
        components:
        - KillPersonCondition
        - TargetObjectiveImmune
