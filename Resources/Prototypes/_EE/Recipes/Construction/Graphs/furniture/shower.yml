- type: construction
  name: ent-Shower
  id: Shower
  graph: Shower
  startNode: start
  targetNode: shower
  category: construction-category-furniture
#   description: shower-description
#  icon:
#    sprite: _EE/Structures/Furniture/shower.rsi
#    state: shower
#    objectType: Structure
  placementMode: SnapgridCenter
  canRotate: true
  canBuildInImpassable: false
  conditions:
  - !type:TileNotBlocked

- type: constructionGraph
  id: Shower
  start: start
  graph:
    - node: start
      edges:
        - to: shower
          completed:
            - !type:SnapToGrid { }
          steps:
            - material: Steel
              amount: 5
              doAfter: 1
    - node: shower
      entity: Shower
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: SheetSteel1
              amount: 5
            - !type:EmptyAllContainers {}
            - !type:DestroyEntity {}
          conditions:
            - !type:EntityAnchored
              anchored: false
          steps:
            - tool: Welding
              doAfter: 2
